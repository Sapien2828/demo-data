<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>病院災害シミュレーション - 座標設定モード</title>
<style>
    body {
        background-color: #222; /* 背景を濃いグレーに */
        color: #fff;
        font-family: 'Segoe UI', 'sans-serif';
        margin: 0;
        height: 100vh;
        width: 100vw;
        overflow: hidden; /* ブラウザのスクロールバーを消す */
        display: flex;
        flex-direction: column;
    }
    
    /* --- トップ画面（オーバーレイ） --- */
    #top-screen {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9);
        z-index: 3000;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
    }

    /* --- ゲーム画面エリア --- */
    #game-wrapper {
        position: relative;
        flex: 1; /* 残りの高さを全て使う */
        display: flex;
        justify-content: center; /* 中央揃え */
        align-items: center;     /* 中央揃え */
        overflow: hidden;
        background-color: #000;
    }

    canvas {
        /* これにより画像全体が画面に収まるよう自動縮小されます */
        max-width: 100%;
        max-height: 100%;
        object-fit: contain; 
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
        cursor: crosshair; /* 座標確認用カーソル */
    }

    /* UIレイヤー（座標表示など） */
    #ui-layer {
        position: absolute;
        top: 10px; left: 10px;
        z-index: 2000;
        pointer-events: none; 
        background: rgba(0,0,0,0.6);
        padding: 5px;
        border-radius: 4px;
    }

    #coord-display {
        font-size: 20px; color: #0f0;
        font-weight: bold;
        margin-top: 5px;
        background: #000;
        padding: 5px 10px;
        border: 2px solid #0f0;
        display: inline-block;
    }

    #status-message {
        color: #ffeb3b;
        font-size: 16px;
    }

    /* ボタン類 */
    .dl-btn {
        padding: 10px 20px; margin: 5px; cursor: pointer;
        background: #444; color: #fff; border: 1px solid #888;
        font-size: 16px;
    }
    .dl-btn:hover { background: #666; }

    /* イベントポップアップなど（今回は非表示前提ですが残します） */
    #event-popup, #result-screen, #admin-login-overlay, #admin-screen {
        display: none;
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.85);
        z-index: 2500;
        align-items: center; justify-content: center; flex-direction: column;
    }
    
    /* ポップアップの中身 */
    .popup-content {
        background: #333; padding: 20px; width: 600px; max-width: 90%;
        border: 2px solid #777; border-radius: 8px;
    }
</style>
</head>
<body>

    <div id="top-screen">
        <h1 style="color:#ffd700;">マップ座標設定モード</h1>
        <p>画面いっぱいに地図を表示しています。<br>クリックして座標を取得してください。</p>
        <button class="dl-btn" onclick="startGame()">開始する</button>
    </div>

    <div id="game-wrapper">
        <canvas id="map-canvas"></canvas>
        
        <div id="ui-layer">
            <div id="status-message">マップをクリックしてください</div>
            <div id="coord-display">X: 0, Y: 0</div>
        </div>
    </div>

    <div id="event-popup"><div class="popup-content">
        <h2 id="event-title"></h2><div id="event-desc"></div><div id="choice-container"></div>
    </div></div>

    <script src="script.js"></script>
</body>
</html>
